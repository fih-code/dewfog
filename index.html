  const frags       = document.getElementById('frags');
  const whisperWrap = document.getElementById('whisperWrap');
  const hintWrap    = document.getElementById('hintWrap');
  const resMsgWrap  = document.getElementById('resMsgWrap');
  const muteBtn     = document.getElementById('muteBtn');

  const RADIUS_MOUSE = 78;
  const RADIUS_TOUCH = 50;
  const THRESHOLD    = 0.65;
  const MIN_READ_MS  = 10000;

  const pageLoadTime = Date.now();

  let resolved     = false;
  let touched      = false;
  let last         = null;
  let dpr          = 1;
  let offscreen    = null;
  let checkTimer   = null;
  let clockTimer   = null;
  let refrostTimer = null;

  // ── time palette ──────────────────────────────────────────────────────────
  // Shift mystery scene and dawn layer subtly by visitor's local hour

  (function applyTimePalette() {
    const h = new Date().getHours();
    const tint = document.getElementById('timeTint');
    if (tint) {
      if      (h >= 22 || h < 4) tint.style.background = 'rgba(4,8,28,0.12)';   // deep night
      else if (h >= 4  && h < 7) tint.style.background = 'rgba(35,18,0,0.08)';  // pre-dawn
      else if (h >= 7  && h < 9) tint.style.background = 'rgba(55,28,0,0.07)';  // dawn
    }
    if (h >= 4 && h < 9) dawn.style.filter = 'brightness(1.07) saturate(1.08)';
  }());

  // ── audio (Web Audio API only — no files, no libraries) ───────────────────
  // Fades in on first pointer touch. At resolve, drone softens and a warm
  // tone blooms. Mute glyph bottom-right remembers choice in localStorage.

  let audioCtx  = null;
  let masterGain = null;
  let isMuted   = localStorage.getItem('dw_mute') === '1';

  if (muteBtn) muteBtn.textContent = isMuted ? '○' : '◎';

  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    masterGain = audioCtx.createGain();
    masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
    masterGain.connect(audioCtx.destination);

    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 300;
    filter.Q.value = 0.7;
    filter.connect(masterGain);

    // three detuned sawtooth oscillators — creates a slow-beating drone
    [[55, 0.38], [55.9, 0.28], [82.4, 0.34]].forEach(function (pair) {
      const osc = audioCtx.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.value = pair[0];
      const g = audioCtx.createGain();
      g.gain.value = pair[1];
      osc.connect(g);
      g.connect(filter);
      osc.start();
    });

    if (!isMuted) {
      masterGain.gain.linearRampToValueAtTime(0.048, audioCtx.currentTime + 3.5);
    }
  }

  function resolveAudio() {
    if (!audioCtx || !masterGain) return;
    masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
    masterGain.gain.linearRampToValueAtTime(0.016, audioCtx.currentTime + 3);

    const bloom = audioCtx.createOscillator();
    bloom.type = 'sine';
    bloom.frequency.value = 220;
    const bg = audioCtx.createGain();
    bg.gain.setValueAtTime(0, audioCtx.currentTime);
    bg.gain.linearRampToValueAtTime(0.07, audioCtx.currentTime + 1.8);
    bg.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 8);
    bloom.connect(bg);
    bg.connect(audioCtx.destination);
    bloom.start();
    bloom.stop(audioCtx.currentTime + 9);
  }

  if (muteBtn) {
    muteBtn.addEventListener('click', function () {
      isMuted = !isMuted;
      localStorage.setItem('dw_mute', isMuted ? '1' : '0');
      muteBtn.textContent = isMuted ? '○' : '◎';
      if (masterGain && audioCtx) {
        masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
        masterGain.gain.linearRampToValueAtTime(
          isMuted ? 0 : 0.048, audioCtx.currentTime + 0.6
        );
      }
    });
  }

  // ── canvas ────────────────────────────────────────────────────────────────

  function initCanvas() {
    const rect = fogCanvas.getBoundingClientRect();
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    fogCanvas.width  = Math.max(1, Math.round(rect.width  * dpr));
    fogCanvas.height = Math.max(1, Math.round(rect.height * dpr));
    paintFrost();
  }

  function paintFrost() {
    const ctx = fogCanvas.getContext('2d');
    const w = fogCanvas.width, h = fogCanvas.height;
    ctx.globalCompositeOperation = 'source-over';
    ctx.clearRect(0, 0, w, h);

    const g = ctx.createRadialGradient(w*0.5, h*0.42, 0, w*0.5, h*0.42, Math.max(w,h)*0.72);
    g.addColorStop(0,   'rgba(190,212,210,0.80)');
    g.addColorStop(0.5, 'rgba(176,198,196,0.90)');
    g.addColorStop(1,   'rgba(150,172,172,0.96)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, w, h);

    const n = Math.round((w * h) / 5200);
    for (let i = 0; i < n; i++) {
      const x   = Math.random() * w;
      const y   = Math.random() * h;
      const rad = (Math.random() * 1.6 + 0.4) * dpr;
      ctx.beginPath();
      ctx.arc(x, y, rad, 0, Math.PI * 2);
      ctx.fillStyle = Math.random() > 0.5
        ? 'rgba(232,242,240,' + (Math.random() * 0.18 + 0.05) + ')'
        : 'rgba(120,142,142,' + (Math.random() * 0.14 + 0.04) + ')';
      ctx.fill();
    }
  }

  // ── re-condensation ───────────────────────────────────────────────────────
  // Paints a faint frost layer every 1.4s so cleared areas slowly haze back.
  // Alpha ~0.021/tick → fully re-frosted in ~48s of no wiping.

  function refrostTick() {
    if (resolved || !touched) return;
    const ctx = fogCanvas.getContext('2d');
    const w = fogCanvas.width, h = fogCanvas.height;
    const a = 0.021;
    ctx.globalCompositeOperation = 'source-over';
    const g = ctx.createRadialGradient(w*0.5, h*0.42, 0, w*0.5, h*0.42, Math.max(w,h)*0.72);
    g.addColorStop(0,   'rgba(190,212,210,' + (a*0.85).toFixed(4) + ')');
    g.addColorStop(0.5, 'rgba(176,198,196,' + a.toFixed(4) + ')');
    g.addColorStop(1,   'rgba(150,172,172,' + (a*1.15).toFixed(4) + ')');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, w, h);
  }

  // ── wipe ──────────────────────────────────────────────────────────────────

  function wipeTo(clientX, clientY, radius) {
    const ctx  = fogCanvas.getContext('2d');
    const rect = fogCanvas.getBoundingClientRect();
    const x    = (clientX - rect.left) / rect.width  * fogCanvas.width;
    const y    = (clientY - rect.top)  / rect.height * fogCanvas.height;
    const R    = radius * dpr;

    ctx.globalCompositeOperation = 'destination-out';

    function stamp(px, py) {
      const rg = ctx.createRadialGradient(px, py, 0, px, py, R);
      rg.addColorStop(0,    'rgba(0,0,0,0.95)');
      rg.addColorStop(0.55, 'rgba(0,0,0,0.55)');
      rg.addColorStop(1,    'rgba(0,0,0,0)');
      ctx.fillStyle = rg;
      ctx.beginPath();
      ctx.arc(px, py, R, 0, Math.PI * 2);
      ctx.fill();
    }

    if (last) {
      const dx    = x - last.x, dy = y - last.y;
      const dist  = Math.hypot(dx, dy);
      const steps = Math.max(1, Math.floor(dist / (R / 3)));
      for (let i = 1; i <= steps; i++) stamp(last.x + dx*i/steps, last.y + dy*i/steps);
    } else {
      stamp(x, y);
    }

    last = { x, y };
    ctx.globalCompositeOperation = 'source-over';
  }

  // ── resolve check ─────────────────────────────────────────────────────────

  function maybeResolve() {
    if (resolved) return;
    if (!offscreen) offscreen = document.createElement('canvas');
    const sw = 100;
    const sh = Math.max(1, Math.round(100 * fogCanvas.height / fogCanvas.width));
    offscreen.width  = sw;
    offscreen.height = sh;
    const o = offscreen.getContext('2d');
    o.clearRect(0, 0, sw, sh);
    o.drawImage(fogCanvas, 0, 0, sw, sh);
    const data = o.getImageData(0, 0, sw, sh).data;
    let clear = 0;
    for (let i = 3; i < data.length; i += 4) if (data[i] < 36) clear++;
    clearFraction = clear / (sw * sh);

    // reveal fragments progressively — each fades in when its clearing threshold is crossed
    REVEAL_IDS.forEach(function (id, i) {
      if (clearFraction >= REVEAL_AT[i]) {
        const el = document.getElementById(id);
        if (el && el.style.opacity === '0') el.style.opacity = '1';
      }
    });

    if (Date.now() - pageLoadTime < MIN_READ_MS) return;
    if (clearFraction >= THRESHOLD) {
      clearInterval(checkTimer);
      triggerResolve();
    }
  }

  function triggerResolve() {
    resolved = true;
    clearInterval(refrostTimer);

    fogCanvas.style.opacity    = '0';
    frags.style.opacity        = '0';
    whisperWrap.style.opacity  = '0';
    clock.style.opacity        = '0';

    dawn.style.opacity         = '1';
    resMsgWrap.style.opacity   = '1';
    resMsgWrap.style.transform = 'translateY(0)';

    tip.style.background  = 'radial-gradient(circle, rgba(240,198,154,.18) 0%, rgba(240,198,154,.05) 45%, rgba(240,198,154,0) 70%)';
    tip.style.borderColor = 'rgba(240,198,154,.3)';
    closingLog.style.opacity = '1';

    localStorage.setItem('dw_resolved', '1');
    resolveAudio();
  }

  // ── clock ─────────────────────────────────────────────────────────────────

  function startClock() {
    let s = 3 * 3600 + 14 * 60 + 7;
    const pad = n => String(n).padStart(2, '0');
    clockTimer = setInterval(function () {
      if (resolved) return;
      s++;
      clock.textContent = 'observed: '
        + pad(Math.floor(s / 3600) % 24) + ':'
        + pad(Math.floor(s / 60) % 60)   + ':'
        + pad(s % 60);
    }, 1000);
  }

  // ── pointer ───────────────────────────────────────────────────────────────

  function bindPointer() {
    const fragEls = ['frag0','frag1','frag2','frag3','frag4','frag5'].map(function (id) {
      return document.getElementById(id);
    });

    function onMove(e) {
      const p = (e.touches && e.touches[0]) || e;
      const x = p.clientX, y = p.clientY;
      tip.style.opacity   = '1';
      tip.style.transform = 'translate(' + x + 'px,' + y + 'px)';

      if (!resolved) {
        const radius = e.pointerType === 'touch' ? RADIUS_TOUCH : RADIUS_MOUSE;
        wipeTo(x, y, radius);

        if (!touched) {
          touched = true;
          hintWrap.style.opacity = '0';
          initAudio();
        }

        // fragment proximity brightening — fragments glow as fingertip approaches
        fragEls.forEach(function (el) {
          if (!el) return;
          const r = el.getBoundingClientRect();
          const d = Math.hypot(x - (r.left + r.width * 0.5), y - (r.top + r.height * 0.5));
          const t = Math.max(0, 1 - d / 160);
          el.style.color = 'rgba(159,232,219,' + (0.62 + 0.35 * t).toFixed(2) + ')';
          el.style.textShadow = '0 0 ' + Math.round(12 + 14*t) + 'px rgba(159,232,219,'
            + (0.40 + 0.45*t).toFixed(2) + ')';
        });
      }
    }

    stage.addEventListener('pointermove', onMove);
    stage.addEventListener('pointerdown', onMove);
    stage.addEventListener('pointerleave', function () {
      last = null;
      tip.style.opacity = '0';
    });
  }

  // ── init ──────────────────────────────────────────────────────────────────

  initCanvas();
  startClock();
  bindPointer();
  checkTimer   = setInterval(maybeResolve, 600);
  refrostTimer = setInterval(refrostTick, 1400);
  window.addEventListener('resize', initCanvas);
}());
</script>
</body>
</html>
