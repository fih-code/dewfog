  <p style="font-size:13px;color:rgba(159,232,219,.7);margin:.4rem 0;">not produced by the brain. we checked.</p>
  <p style="font-size:13px;color:rgba(159,232,219,.7);margin:.4rem 0;">matter is the residue. the looking comes first.</p>
  <p style="font-size:13px;color:rgba(159,232,219,.7);margin:.4rem 0;">the hard problem of consciousness has not been solved. only quieted.</p>
  <p style="font-size:13px;color:rgba(159,232,219,.7);margin:.4rem 0;">the signal precedes the receiver. filter, not generator.</p>
  <p style="font-size:13px;color:rgba(159,232,219,.7);margin:.4rem 0;">particles are temporary. the field is not.</p>
  <p style="font-size:13px;color:rgba(159,232,219,.7);margin:.4rem 0;">e=mc². what appears solid is a temporary arrangement of something else.</p>
  <p style="font-size:13px;color:rgba(159,232,219,.7);margin:.4rem 0;">every tradition found the same place. none agreed on the name.</p>
  <p style="font-size:13px;color:rgba(159,232,219,.7);margin:.4rem 0;">vedanta: tat tvam asi. the student and the infinite were never separate. twenty-five centuries of pointing.</p>
  <p style="font-size:13px;color:rgba(159,232,219,.7);margin:.4rem 0;">vedanta called it brahman. dzogchen calls it rigpa. physics calls it the field.</p>
  <p style="font-size:13px;color:rgba(159,232,219,.7);margin:.4rem 0;">the christian mystical tradition found it interior. not above. not after. within.</p>
  <p style="font-size:13px;color:rgba(159,232,219,.7);margin:.4rem 0;">the sufi accounts of fana match the near-death experience reports.</p>
  <p style="font-size:13px;color:rgba(159,232,219,.7);margin:.4rem 0;">the tao that can be named is not it. they knew the problem.</p>
  <p style="font-size:13px;color:rgba(159,232,219,.7);margin:.4rem 0;">zen: before thinking, what are you? they are asking our question.</p>
  <p style="font-size:13px;color:rgba(159,232,219,.7);margin:.4rem 0;">plotinus: the one. not a deity. a ground. we think he was right.</p>
  <p style="font-size:13px;color:rgba(159,232,219,.7);margin:.4rem 0;">the mystics arrived here first. science is still catching up.</p>
  <p style="font-size:13px;color:rgba(159,232,219,.7);margin:.4rem 0;">no cortical activity. full conscious account. we are still checking.</p>
  <p style="font-size:13px;color:rgba(159,232,219,.7);margin:.4rem 0;">the observer is not produced by what it observes.</p>

  <p style="font-size:13px;color:rgba(159,232,219,.7);margin:.4rem 0;">materialism is one interpretation of reality. it is not the only one.</p>
  <p style="font-size:13px;color:rgba(159,232,219,.7);margin:.4rem 0;">what if consciousness is not produced by the brain, but is the ground of reality itself?</p>

(function () {

  // ── fragment pool ─────────────────────────────────────────────────────────
  // 16 notes drawn from the essay's ideas. 4 are chosen at random each visit

  const FRAGMENT_POOL = [
    // original notes
    'entry 47 — it held longer this time',
    'not produced by the brain. we checked.',
    'matter is the residue. the looking comes first.',
    { redacted: true },

    'e=mc². what appears solid is a temporary arrangement of something else.',
    'entry 5 — mass is energy that paused. we are asking what the energy is.',
    'the equation says the solid is not. physics confirmed it. we are working on the rest.',
    'entry 38 — concentrated. not fundamental. there is a difference.',
    // religious convergence thread — every tradition found it, none could prove it
    'vedanta: tat tvam asi. the student and the infinite were never separate. twenty-five centuries of pointing.',
    'vedanta called it brahman. the field they describe matches.',
    'dzogchen calls it rigpa. we have a different word. same location.',
    'entry 66 — zen: before thinking, what are you? they are asking our question.',
    'entry 88 — the sufi accounts of fana match the nde reports. we checked.',
    'the islamic mystical tradition points to the same interior. a different name. same location.',
    'the christian mystical tradition found it interior. not above. not after. within.',
    'christian mystics: the ground of being is not separate from the being. logged.',
    'the tao that can be named is not it. they knew the problem.',
    'plotinus: the one. not a deity. a ground. we think he was right.',
    'every tradition found the same place. none agreed on the name.',
    'entry 56 — the mystics arrived here first. we are still catching up.',
  ];

  // one of these appears in the resolution state a few seconds after dawn lifts
  const CLOSING_POOL = [
    'log closed — subject arrived.',
    'entry 103 — the subject was correct.',
    'observation complete. result: prior.',
    'end of log. the field holds.',
    'entry 0 — recorded before the search began.',
    'the glass was always clear on one side.',
    'what you found was here before you looked.',
  ];

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function fragHTML(f) {
    if (f && f.redacted) {
      return 'the <span style="background:rgba(159,232,219,.22);color:transparent;padding:0 .15em;letter-spacing:0;">██████</span> is not lost — nothing here is';
    }
    return f;
  }

  const chosen = shuffle(FRAGMENT_POOL).slice(0, 4);
  ['frag0', 'frag1', 'frag2', 'frag3'].forEach(function (id, i) {
    document.getElementById(id).innerHTML = fragHTML(chosen[i]);
  });

  // closing log — one entry from CLOSING_POOL shown after dawn lifts
  const closingLog = document.getElementById('closingLog');
  closingLog.textContent = CLOSING_POOL[Math.floor(Math.random() * CLOSING_POOL.length)];

  // visit counter — starts at 2,317 and increments per device so it feels alive
  const visits = parseInt(localStorage.getItem('dw_v') || '0') + 1;
  localStorage.setItem('dw_v', String(visits));
  document.getElementById('fragTop').textContent =
    'you are the ' + (2316 + visits).toLocaleString() + 'th to wipe the glass';

  // ── end fragment pool ─────────────────────────────────────────────────────

  const stage      = document.getElementById('stage');
  const fogCanvas  = document.getElementById('fog');
  const tip        = document.getElementById('tip');
  const clock      = document.getElementById('clock');
  const dawn       = document.getElementById('dawn');
  const frags      = document.getElementById('frags');
  const whisperWrap = document.getElementById('whisperWrap');
  const hintWrap   = document.getElementById('hintWrap');
  const resMsgWrap = document.getElementById('resMsgWrap');

  const WIPE_RADIUS  = 78;
  const THRESHOLD    = 0.52;

  let resolved   = false;
  let touched    = false;
  let last       = null;
  let dpr        = 1;
  let offscreen  = null;
  let checkTimer = null;
  let clockTimer = null;

  // ── canvas ────────────────────────────────────────────────────────────────

  function initCanvas() {
    const rect = fogCanvas.getBoundingClientRect();
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    fogCanvas.width  = Math.max(1, Math.round(rect.width  * dpr));
    fogCanvas.height = Math.max(1, Math.round(rect.height * dpr));
    paintFrost();
  }

  function paintFrost() {
    const ctx = fogCanvas.getContext('2d');
    const w = fogCanvas.width, h = fogCanvas.height;
    ctx.globalCompositeOperation = 'source-over';
    ctx.clearRect(0, 0, w, h);

    const g = ctx.createRadialGradient(w * 0.5, h * 0.42, 0, w * 0.5, h * 0.42, Math.max(w, h) * 0.72);
    g.addColorStop(0,   'rgba(190,212,210,0.80)');
    g.addColorStop(0.5, 'rgba(176,198,196,0.90)');
    g.addColorStop(1,   'rgba(150,172,172,0.96)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, w, h);

    const n = Math.round((w * h) / 5200);
    for (let i = 0; i < n; i++) {
      const x   = Math.random() * w;
      const y   = Math.random() * h;
      const rad = (Math.random() * 1.6 + 0.4) * dpr;
      ctx.beginPath();
      ctx.arc(x, y, rad, 0, Math.PI * 2);
      ctx.fillStyle = Math.random() > 0.5
        ? 'rgba(232,242,240,' + (Math.random() * 0.18 + 0.05) + ')'
        : 'rgba(120,142,142,' + (Math.random() * 0.14 + 0.04) + ')';
      ctx.fill();
    }
  }

  // ── wipe ──────────────────────────────────────────────────────────────────

  function wipeTo(clientX, clientY) {
    const ctx  = fogCanvas.getContext('2d');
    const rect = fogCanvas.getBoundingClientRect();
    const x    = (clientX - rect.left) / rect.width  * fogCanvas.width;
    const y    = (clientY - rect.top)  / rect.height * fogCanvas.height;
    const R    = WIPE_RADIUS * dpr;

    ctx.globalCompositeOperation = 'destination-out';

    function stamp(px, py) {
      const rg = ctx.createRadialGradient(px, py, 0, px, py, R);
      rg.addColorStop(0,    'rgba(0,0,0,0.95)');
      rg.addColorStop(0.55, 'rgba(0,0,0,0.55)');
      rg.addColorStop(1,    'rgba(0,0,0,0)');
      ctx.fillStyle = rg;
      ctx.beginPath();
      ctx.arc(px, py, R, 0, Math.PI * 2);
      ctx.fill();
    }

    if (last) {
      const dx    = x - last.x, dy = y - last.y;
      const dist  = Math.hypot(dx, dy);
      const steps = Math.max(1, Math.floor(dist / (R / 3)));
      for (let i = 1; i <= steps; i++) stamp(last.x + dx * i / steps, last.y + dy * i / steps);
    } else {
      stamp(x, y);
    }

    last = { x, y };
    ctx.globalCompositeOperation = 'source-over';
  }

  // ── resolve check ─────────────────────────────────────────────────────────

  function maybeResolve() {
    if (resolved) return;
    if (!offscreen) offscreen = document.createElement('canvas');
    const sw = 100;
    const sh = Math.max(1, Math.round(100 * fogCanvas.height / fogCanvas.width));
    offscreen.width  = sw;
    offscreen.height = sh;
    const o = offscreen.getContext('2d');
    o.clearRect(0, 0, sw, sh);
    o.drawImage(fogCanvas, 0, 0, sw, sh);
    const data  = o.getImageData(0, 0, sw, sh).data;
    let clear   = 0;
    for (let i = 3; i < data.length; i += 4) if (data[i] < 36) clear++;
    if (clear / (sw * sh) >= THRESHOLD) {
      clearInterval(checkTimer);
      triggerResolve();
    }
  }

  function triggerResolve() {
    resolved = true;

    fogCanvas.style.opacity    = '0';
    frags.style.opacity        = '0';
    whisperWrap.style.opacity  = '0';
    clock.style.opacity        = '0';

    dawn.style.opacity         = '1';
    resMsgWrap.style.opacity   = '1';
    resMsgWrap.style.transform = 'translateY(0)';

    tip.style.background   = 'radial-gradient(circle, rgba(240,198,154,.18) 0%, rgba(240,198,154,.05) 45%, rgba(240,198,154,0) 70%)';
    tip.style.borderColor  = 'rgba(240,198,154,.3)';
    closingLog.style.opacity = '1';
  }

  // ── clock ─────────────────────────────────────────────────────────────────

  function startClock() {
    let s = 3 * 3600 + 14 * 60 + 7;
    const pad = n => String(n).padStart(2, '0');
    clockTimer = setInterval(() => {
      if (resolved) return;
      s++;
      clock.textContent = 'observed: '
        + pad(Math.floor(s / 3600) % 24) + ':'
        + pad(Math.floor(s / 60) % 60)   + ':'
        + pad(s % 60);
    }, 1000);
  }

  // ── pointer ───────────────────────────────────────────────────────────────

  function bindPointer() {
    function onMove(e) {
      const p = (e.touches && e.touches[0]) || e;
      const x = p.clientX, y = p.clientY;
      tip.style.opacity   = '1';
      tip.style.transform = 'translate(' + x + 'px,' + y + 'px)';
      if (!resolved) {
        wipeTo(x, y);
        if (!touched) {
          touched = true;
          hintWrap.style.opacity = '0';
        }
      }
    }

    stage.addEventListener('pointermove', onMove);
    stage.addEventListener('pointerdown', onMove);
    stage.addEventListener('pointerleave', () => {
      last = null;
      tip.style.opacity = '0';
    });
  }

  // ── init ──────────────────────────────────────────────────────────────────

  initCanvas();
  startClock();
  bindPointer();
  checkTimer = setInterval(maybeResolve, 600);
  window.addEventListener('resize', initCanvas);
}());
</script>
