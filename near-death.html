<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>near death — dewfog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Italiana&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0b1316; overflow: hidden; }
    * { box-sizing: border-box; }
    #ui { position: fixed; inset: 0; pointer-events: none; font-family: 'Space Mono', monospace; }
    #title-wrap {
      position: absolute; top: 5%; left: 50%;
      transform: translateX(-50%);
      text-align: center; white-space: nowrap;
    }
    h1 {
      font-family: 'Italiana', serif; font-weight: 400; text-transform: lowercase;
      color: rgba(223,240,236,.65);
      font-size: clamp(1.5rem,3vw,2.8rem); letter-spacing: .06em; margin: 0;
      text-shadow: 0 0 26px rgba(159,232,219,.55), 0 0 60px rgba(159,232,219,.25);
    }
    .subtitle {
      font-size: 9px; letter-spacing: .44em; text-transform: uppercase;
      color: rgba(159,232,219,.32); margin: .45em 0 0;
    }
    #status {
      position: absolute; bottom: 6%; left: 50%;
      transform: translateX(-50%);
      font-size: 9px; letter-spacing: .28em;
      color: rgba(159,232,219,.35); text-align: center;
      transition: color 2s ease;
    }
    #home-btn {
      position: absolute; top: 5%; left: 5%;
      font-size: 9px; letter-spacing: .44em; text-transform: uppercase;
      color: rgba(159,232,219,.32); text-decoration: none;
      pointer-events: auto; transition: color .4s ease;
    }
    #home-btn:hover { color: rgba(159,232,219,.75); }
    #vignette {
      position: fixed; inset: 0; pointer-events: none;
      box-shadow: inset 0 0 200px 40px rgba(6,12,14,.55);
    }
  </style>
</head>
<body>

<canvas id="c" style="display:block;position:fixed;inset:0;"></canvas>

<div id="ui">
  <a id="home-btn" href="/">home</a>
  <div id="title-wrap">
    <h1>near death</h1>
    <div class="subtitle">void · light · return</div>
  </div>
  <div id="status"></div>
</div>

<div id="vignette"></div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const status = document.getElementById('status');

let W, H, cx, cy;

// ----- particle system -----
const N      = 280;    // particle count
const FOCAL  = 360;    // perspective focal length
const FAR_Z  = 820;    // spawn depth
const NEAR_Z = 5;      // cull depth

let particles = [];
const tubeR = () => Math.min(W, H) * 0.13;

function makeParticle(randomZ) {
  const theta = Math.random() * Math.PI * 2;
  const r = Math.sqrt(Math.random()) * tubeR(); // sqrt bias → more particles near wall
  return {
    ox: Math.cos(theta), oy: Math.sin(theta), r,
    z: randomZ ? Math.random() * FAR_Z : FAR_Z * (0.2 + Math.random() * 0.8),
    speed: 0.8 + Math.random() * 2.0,
    lx: null, ly: null,  // last screen position for streak
  };
}

// ----- phase machine -----
const PHASES = ['void', 'approach', 'threshold', 'return'];
const DUR    = { void: 70, approach: 315, threshold: 92, return: 118 };

let phase = 'void', phaseF = 0;
let speedMult = 0.12, lightI = 0;

const STATUS = {
  void:      'silence',
  approach:  'a presence in the distance',
  approach2: 'moving toward the light',
  approach3: 'the boundary approaches',
  threshold: 'the threshold',
  return:    'returning',
};

function initPhase(p) {
  phase = p; phaseF = 0;
  if (p !== 'approach') status.textContent = STATUS[p] || '';
  else status.textContent = STATUS.approach;
}

function nextPhase() {
  initPhase(PHASES[(PHASES.indexOf(phase) + 1) % PHASES.length]);
}

// ----- color helpers -----
// Interpolate teal → warm white as lightI goes 0 → 1
function particleColorStr() {
  const r = Math.round(159 + (255 - 159) * lightI);
  const g = Math.round(232 + (250 - 232) * lightI);
  const b = Math.round(219 + (232 - 219) * lightI);
  return `${r},${g},${b}`;
}

// ----- draw -----
function drawBg() {
  ctx.fillStyle = '#0b1316';
  ctx.fillRect(0, 0, W, H);
  // warm white wash that builds toward threshold
  if (lightI > 0) {
    ctx.fillStyle = `rgba(255,250,232,${lightI * 0.88})`;
    ctx.fillRect(0, 0, W, H);
  }
}

function drawCentralLight() {
  if (lightI <= 0) return;
  const r = Math.min(W, H) * 0.68 * lightI;
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
  g.addColorStop(0,    `rgba(255,252,238,${Math.min(lightI * 1.4, 1)})`);
  g.addColorStop(0.2,  `rgba(255,248,220,${lightI * 0.72})`);
  g.addColorStop(0.55, `rgba(200,242,232,${lightI * 0.28})`);
  g.addColorStop(1,    `rgba(159,232,219,0)`);
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
}

function drawParticles() {
  const c = particleColorStr();

  for (const p of particles) {
    // advance depth
    p.z -= p.speed * speedMult;

    if (p.z < NEAR_Z) {
      p.z = FAR_Z * (0.25 + Math.random() * 0.75);
      p.lx = null; // no streak after teleport
      continue;
    }

    const scale = FOCAL / Math.max(p.z, 1);
    const sx = cx + p.ox * p.r * scale;
    const sy = cy + p.oy * p.r * scale;
    const size  = Math.max(0.4, scale * 1.35);
    // depth-based alpha: dim when far, bright when close
    const depthA = Math.pow(1 - p.z / FAR_Z, 2.0);
    const alpha  = Math.min(depthA * (0.45 + lightI * 0.55), 0.95);

    if (size < 0.2 || alpha < 0.01) { p.lx = null; continue; }

    // motion streak — only when fast enough and previous position is close
    if (p.lx !== null && speedMult > 0.35) {
      const dl = Math.hypot(sx - p.lx, sy - p.ly);
      if (dl > 0.5 && dl < 90) {
        ctx.beginPath();
        ctx.moveTo(p.lx, p.ly);
        ctx.lineTo(sx, sy);
        ctx.strokeStyle = `rgba(${c},${(alpha * 0.40).toFixed(3)})`;
        ctx.lineWidth   = Math.max(0.3, size * 0.36);
        ctx.stroke();
      }
    }

    // point
    ctx.beginPath();
    ctx.arc(sx, sy, size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${c},${alpha})`;
    ctx.fill();

    p.lx = sx; p.ly = sy;
  }
}

// ----- main loop -----
function frame() {
  try {
    const t = phaseF / DUR[phase];

    if (phase === 'void') {
      speedMult = 0.12 + 0.18 * t;           // 0.12 → 0.30
      lightI    = 0;
    } else if (phase === 'approach') {
      const e = t * t * (3 - 2 * t);         // smooth-step ease
      speedMult = 0.30 + 2.20 * e;           // 0.30 → 2.50
      lightI    = e * 0.72;
      // update status text at key moments
      const f32 = Math.floor(DUR.approach * 0.30);
      const f60 = Math.floor(DUR.approach * 0.62);
      if (phaseF === f32) status.textContent = STATUS.approach2;
      if (phaseF === f60) status.textContent = STATUS.approach3;
    } else if (phase === 'threshold') {
      speedMult = 2.50 - 0.50 * t;           // 2.50 → 2.00
      lightI    = 0.72 + 0.28 * t;           // 0.72 → 1.00
    } else if (phase === 'return') {
      speedMult = 2.00 - 1.90 * t;           // 2.00 → 0.10
      lightI    = 1 - t;                      // 1.00 → 0.00
    }

    drawBg();
    drawCentralLight();
    drawParticles();

    if (++phaseF >= DUR[phase]) nextPhase();
  } catch (e) {}
  requestAnimationFrame(frame);
}

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W * .5; cy = H * .5;
  particles = Array.from({ length: N }, () => makeParticle(true));
  initPhase('void');
}
window.addEventListener('resize', resize);
resize();
requestAnimationFrame(frame);
</script>
</body>
</html>
